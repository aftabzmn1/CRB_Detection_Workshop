<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}CRB detection{% endblock %}</title>
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --text: #e6edf3;
      --muted: #8b9cb3;
      --accent: #3fb950;
      --danger: #f85149;
      --link: #58a6ff;
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .wrap { max-width: 960px; margin: 0 auto; }
    nav {
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
    }
    nav a {
      color: var(--link);
      text-decoration: none;
      font-weight: 600;
    }
    nav a:hover { text-decoration: underline; }
    nav span { color: var(--muted); margin: 0 0.5rem; }
    h1 { font-size: 1.5rem; font-weight: 600; margin: 0 0 0.5rem; }
    p.lead { color: var(--muted); margin: 0 0 1.5rem; font-size: 0.95rem; }
    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
    }
    .err { color: var(--danger); font-size: 0.9rem; margin: 0; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
    }
    .tile {
      background: var(--card);
      border-radius: 12px;
      overflow: hidden;
    }
    .tile img {
      width: 100%;
      height: auto;
      display: block;
      vertical-align: middle;
    }
    .tile figcaption {
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
      color: var(--muted);
      word-break: break-all;
    }
    ul.labels {
      list-style: none;
      padding: 0 0.75rem 0.75rem;
      margin: 0;
      font-size: 0.8rem;
      color: var(--muted);
    }
    ul.labels li { padding: 0.15rem 0; }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
  <div class="wrap">
    <nav>
      <a href="{{ url_for('main.trap_images') }}">Trap Images</a>
      <span>|</span>
      <a href="{{ url_for('main.detected_images') }}">Detected Images</a>
    </nav>
    {% block content %}{% endblock %}
  </div>
</body>
</html>
